---
# The secrets role does NOT generate the application secrets (DB URL, JWT
# keys, OAuth credentials, SMTP). The operator places those manually at
#   {{ secrets_dir }}/api.env       (read by pantry-api.service)
#   {{ secrets_dir }}/admin.env     (read by pantry-admin.service)
# This keeps real secrets out of git and out of Ansible's logs.
#
# This role:
#   1. Asserts both env files exist
#   2. Enforces strict mode/ownership
#   3. Generates the age keypair once for backup encryption (idempotent)
- name: Stat api.env
  ansible.builtin.stat:
    path: "{{ secrets_dir }}/api.env"
  register: secrets_api_env_stat

- name: Stat admin.env
  ansible.builtin.stat:
    path: "{{ secrets_dir }}/admin.env"
  register: secrets_admin_env_stat

- name: Fail if api.env is missing
  ansible.builtin.fail:
    msg: |
      {{ secrets_dir }}/api.env is missing on the host.
      Create it manually (mode 0600, owned by {{ app_user }}:{{ app_group }})
      using api/.env.example as a template. Required keys are documented in
      infra/README.md "Required secrets".
  when: not secrets_api_env_stat.stat.exists

- name: Fail if admin.env is missing
  ansible.builtin.fail:
    msg: |
      {{ secrets_dir }}/admin.env is missing on the host.
      Create it manually (mode 0600, owned by {{ app_user }}:{{ app_group }})
      using apps/admin/.env.example as a template.
  when: not secrets_admin_env_stat.stat.exists

- name: Enforce permissions on api.env
  ansible.builtin.file:
    path: "{{ secrets_dir }}/api.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0600"

- name: Enforce permissions on admin.env
  ansible.builtin.file:
    path: "{{ secrets_dir }}/admin.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0600"

# ---------------------------------------------------------------------------
# Age keypair for encrypted backups.
#
# Generated ONCE on first apply. The private key lives at
# {{ secrets_dir }}/age.key (root:root 0600), the public key at
# {{ secrets_dir }}/age.pub (root:root 0644). The backup script reads age.pub;
# the restore script reads age.key. Re-applies do NOT regenerate the key.
# ---------------------------------------------------------------------------
- name: Stat age private key
  ansible.builtin.stat:
    path: "{{ secrets_dir }}/age.key"
  register: secrets_age_key_stat

- name: Generate age keypair on first run
  ansible.builtin.shell: |
    set -euo pipefail
    umask 077
    age-keygen -o {{ secrets_dir }}/age.key
    grep '^# public key:' {{ secrets_dir }}/age.key | sed 's/^# public key: //' > {{ secrets_dir }}/age.pub
  args:
    creates: "{{ secrets_dir }}/age.key"
  when: not secrets_age_key_stat.stat.exists
  no_log: true

- name: Lock down age private key
  ansible.builtin.file:
    path: "{{ secrets_dir }}/age.key"
    owner: root
    group: root
    mode: "0600"
    state: file

- name: Make age public key readable
  ansible.builtin.file:
    path: "{{ secrets_dir }}/age.pub"
    owner: root
    group: root
    mode: "0644"
    state: file

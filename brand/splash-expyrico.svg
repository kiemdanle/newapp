<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1284 2778" role="img" aria-label="Expyrico splash screen">
  <defs>
    <linearGradient id="sage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#52BF99"/>
      <stop offset="1" stop-color="#3A8F6F"/>
    </linearGradient>
    <linearGradient id="honey" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8B73A"/>
      <stop offset="1" stop-color="#F0971A"/>
    </linearGradient>
  </defs>

  <!-- Warm White background -->
  <rect width="1284" height="2778" fill="#FAFAF8"/>

  <!-- Stacked lockup, vertically centered -->
  <g transform="translate(642 1206)">
    <!-- Mark (centered, 560px) -->
    <g transform="translate(-280 0)">
      <rect x="0" y="0" width="560" height="560" rx="124" ry="124" fill="url(#sage)"/>
      <rect x="0" y="0" width="560" height="560" rx="124" ry="124" fill="#FFFFFF" opacity="0.06"/>
      <g transform="scale(0.546875)">
        <path d="M 360 360 A 232 232 0 1 0 360 664" fill="none" stroke="#FFFFFF" stroke-width="98" stroke-linecap="round"/>
        <path d="M 318 512 H 612" fill="none" stroke="#FFFFFF" stroke-width="98" stroke-linecap="round"/>
        <g transform="translate(648 470) rotate(-42)">
          <path d="M 0 -150 C 70 -95 70 95 0 150 C -70 95 -70 -95 0 -150 Z" fill="url(#honey)"/>
          <path d="M 0 -138 L 0 138" fill="none" stroke="#3A8F6F" stroke-width="12" stroke-linecap="round" opacity="0.55"/>
        </g>
      </g>
    </g>

    <!-- Wordmark -->
    <text x="0" y="720" text-anchor="middle" fill="#3A8F6F"
          font-family="'Inter','Helvetica Neue',Arial,sans-serif"
          font-weight="700" font-size="168" letter-spacing="-4">expyrico</text>
  </g>
</svg>

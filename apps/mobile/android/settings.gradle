pluginManagement {
  def rnVersionFile = new File(rootDir, "../node_modules/react-native/package.json")
  def version = new groovy.json.JsonSlurper().parse(rnVersionFile).version
  def (_, reactNativeMinor, reactNativePatch) = version.split("-")[0].tokenize('.').collect { it.toInteger() }

  includeBuild(new File(rootDir, "../node_modules/@react-native/gradle-plugin").toString())
  if(reactNativeMinor == 74 && reactNativePatch <= 3){
    includeBuild("react-settings-plugin")
  }
}

plugins { id("com.facebook.react.settings") }

def getRNMinorVersion() {
  def rnVersionFile = new File(rootDir, "../node_modules/react-native/package.json")
  def version = new groovy.json.JsonSlurper().parse(rnVersionFile).version
  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }
  return minor
}

if (getRNMinorVersion() >= 75) {
  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    if (System.getenv('EXPO_UNSTABLE_CORE_AUTOLINKING') == '1') {
      println('[32mUsing expo-modules-autolinking as core autolinking source[0m')
      def command = [
        'node',
        '--no-warnings',
        '--eval',
        'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
        'react-native-config',
        '--json',
        '--platform',
        'android'
      ].toList()
      ex.autolinkLibrariesFromCommand(command)
    } else {
      ex.autolinkLibrariesFromCommand()
    }
  }
}

rootProject.name = 'Expyrico'

dependencyResolutionManagement {
  versionCatalogs {
    reactAndroidLibs {
      from(files(new File(rootDir, "../node_modules/react-native/gradle/libs.versions.toml")))
    }
  }
}

apply from: new File(rootDir, "../node_modules/expo/scripts/autolinking.gradle");
useExpoModules()

if (getRNMinorVersion() < 75) {
  apply from: new File(rootDir, "../node_modules/@react-native-community/cli-platform-android/native_modules.gradle");
  applyNativeModulesSettingsGradle(settings)
}

include ':app'
includeBuild(new File(rootDir, "../node_modules/@react-native/gradle-plugin"))
